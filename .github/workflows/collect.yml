name: Collect Bybit momentum data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub may delay this a few minutes under load)
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch snapshot and update history.json
        run: python scripts/collect.py

      - name: Commit and push if changed
        run: |
          git config user.name "momentum-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/history.json
          if ! git diff --staged --quiet; then
            git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No changes to commit"
          fi
